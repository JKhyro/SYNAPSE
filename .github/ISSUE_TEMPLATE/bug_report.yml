name: Bug report
description: Report a defect in the repository, shell contract, or operator baseline.
title: "[Bug] "
labels: []
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the defect plainly.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Explain what is blocked or degraded.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Commands, UI steps, or repo context needed to reproduce.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Errors, logs, screenshots, or GitHub links.
    validations:
      required: false
