name: Feature request
description: Propose a bounded enhancement for SYNAPSE.
title: "[Feature] "
labels: []
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What outcome should this change unlock
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in bounds for this request
    validations:
      required: true
  - type: textarea
    id: guardrails
    attributes:
      label: Guardrails
      description: What should not happen as part of this change
    validations:
      required: true
  - type: dropdown
    id: boundary
    attributes:
      label: Primary boundary
      options:
        - Native C
        - Avalonia host
        - Native C interop
        - GitHub/project surface
        - Repository structure
    validations:
      required: true
